<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Awareness</title>
    <style>
        :root {
            --primary-color: #4a00e0;
            --secondary-color: #8e2de2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #6c559b, #65487e);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-color);
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ऊपरी फिक्स हैडर (स्कोर और प्रोग्रेस के लिए) */
        .sticky-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: var(--card-bg);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            padding: 15px 20px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sticky-header h1 {
            font-size: 18px;
            color: #333;
        }

        .score-box {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* मुख्य कंटेनर जहाँ सारे प्रश्न लोड होंगे */
        .quiz-container {
            width: 100%;
            max-width: 650px;
            margin-top: 25px; /* हैडर के लिए जगह */
            margin-bottom: 50px;
            display: flex;
            flex-direction: column;
            gap: 25px; /* प्रश्नों के बीच का अंतर */
        }

        /* हर एक प्रश्न का अपना स्वतंत्र कार्ड */
        .question-card {
            background-color: #eeebec;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            padding: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s forwards ease-out;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
        }

        .question-meta {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #eee;
            padding-bottom: 8px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.5;
            margin-top: 10px;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        /* विकल्पों की सूची (एक के नीचे एक) */
        .options-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            outline: none;
            display: block;
        }

        .option-btn:hover:not([disabled]) {
            background-color: #e8f0fe;
            border-color: #3b82f6;
            transform: translateX(5px); /* हल्का सा दाईं ओर खिसकेगा */
        }

        /* सही उत्तर का स्टाइल */
        .option-btn.correct {
            background-color: #d4edda !important;
            border-color: var(--success-color) !important;
            color: #155724;
            font-weight: bold;
        }

        /* गलत उत्तर का स्टाइल */
        .option-btn.wrong {
            background-color: #f8d7da !important;
            border-color: var(--error-color) !important;
            color: #721c24;
        }

        /* परिणाम संदेश का स्टाइल */
        .feedback-msg {
            margin-top: 15px;
            font-size: 15px;
            font-weight: bold;
            display: none;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

        .feedback-correct {
            background-color: #e2fbe8;
            color: #1e7e34;
        }

        .feedback-wrong {
            background-color: #fdf2f2;
            color: #bd2130;
        }

        /* लोडिंग सूचक */
        .loading-spinner {
            text-align: center;
            color: white;
            font-size: 16px;
            font-weight: bold;
            margin: 20px 0;
            padding: 10px;
        }

        /* डिलीट बटन के लिए नया स्टाइल (मौजूदा CSS से मिलता जुलता) */
        .clear-btn-container {
            margin: 20px 0 4px 0;
            text-align: center;
            width: 100%;
            max-width: 650px;
        }

        .clear-storage-btn {
            background-color: var(--error-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: background-color 0.2s, transform 0.2s;
        }

        .clear-storage-btn:hover {
            background-color: #c0392b;
            transform: scale(1.02);
        }
        .top-cls{
            margin-top: 30px;
            margin-bottom: -40px;
        }
    </style>
</head>
<body>
<div class="clear-btn-container">
    <button class=" top-cls clear-storage-btn" id="clear-storage-btn">क्विज़ डेटा रीसेट करें</button>
</div>
<div class="sticky-header">
    <h1 id="header-title">General Awareness क्विज़</h1>
    <div class="score-box" id="score-display">स्कोर: 0 / 0</div>
</div>

<div class="quiz-container" id="quiz-container"></div>

<div class="loading-spinner" id="loading-spinner">नीचे स्क्रॉल करें और नए सवाल पाएँ...</div>

<!-- सबसे नीचे डेटा डिलीट करने का बटन -->
<div class="clear-btn-container">
    <button class="clear-storage-btn" id="clear-storage-btn">क्विज़ डेटा रीसेट करें</button>
</div>

<script src="questions.js"></script>

<script>
    let loadedCount = 0;       // अब तक कितने सवाल लोड हुए
    const batchSize = 50;      // एक बार में कितने सवाल लोड करने हैं
    let score = 0;             // सही उत्तरों का स्कोर
    let attemptedCount = 0;    // कुल कितने सवालों का उत्तर यूजर ने दे दिया है
    
    // लोकल स्टोरेज से पुराने उत्तरों को लोड करना
    let savedAnswers = JSON.parse(localStorage.getItem("quizAnswers")) || {};

    const quizContainer = document.getElementById("quiz-container");
    const scoreDisplay = document.getElementById("score-display");
    const loadingSpinner = document.getElementById("loading-spinner");
    const clearStorageBtn = document.getElementById("clear-storage-btn");

    // प्रश्न को स्क्रीन पर रेंडर (क्रिएट) करने का फंक्शन
    function createQuestionCard(qData, globalIndex) {
        // नया कार्ड एलीमेंट बनाएँ
        const card = document.createElement("div");
        card.classList.add("question-card");
        card.id = `q-card-${globalIndex}`;

        // श्रेणी (Category) और प्रश्न संख्या
        const meta = document.createElement("div");
        meta.classList.add("question-meta");
        meta.innerHTML = `
            <span>${qData.category}</span>
            <span>सवाल नं. ${globalIndex + 1}</span>
        `;
        card.appendChild(meta);

        // प्रश्न का टेक्स्ट
        const qText = document.createElement("div");
        qText.classList.add("question-text");
        qText.innerText = qData.question;
        card.appendChild(qText);

        // विकल्पों की सूची
        const optionsList = document.createElement("div");
        optionsList.classList.add("options-list");

        // फीडबैक मेसेज बॉक्स (उत्तर देने के बाद दिखेगा)
        const feedback = document.createElement("div");
        feedback.classList.add("feedback-msg");

        qData.options.forEach((option, optionIndex) => {
            const button = document.createElement("button");
            button.classList.add("option-btn");
            button.innerText = option;
            
            // क्लिक होने पर उत्तर चेक करें
            button.onclick = () => {
                handleOptionSelect(button, optionIndex, qData.correct, optionsList, feedback, globalIndex);
            };

            optionsList.appendChild(button);
        });

        card.appendChild(optionsList);
        card.appendChild(feedback);
        quizContainer.appendChild(card);

        // अगर इस सवाल का जवाब पहले से दिया जा चुका है तो उसे रिस्टोर करें
        if (savedAnswers[globalIndex] !== undefined) {
            const savedSelectedIdx = savedAnswers[globalIndex];
            const buttons = optionsList.getElementsByClassName("option-btn");
            
            // बटन लॉक करें
            for (let btn of buttons) {
                btn.disabled = true;
            }

            if (savedSelectedIdx === qData.correct) {
                buttons[savedSelectedIdx].classList.add("correct");
                feedback.innerText = "बिल्कुल सही जवाब! 🎉";
                feedback.className = "feedback-msg feedback-correct";
            } else {
                buttons[savedSelectedIdx].classList.add("wrong");
                buttons[qData.correct].classList.add("correct");
                feedback.innerText = `गलत जवाब! सही उत्तर था: ${buttons[qData.correct].innerText}`;
                feedback.className = "feedback-msg feedback-wrong";
            }
            feedback.style.display = "block";
        }
    }

    // विकल्प चुनने की प्रक्रिया
    function handleOptionSelect(selectedButton, selectedIdx, correctIdx, optionsList, feedbackElement, globalIndex) {
        const buttons = optionsList.getElementsByClassName("option-btn");
        
        // एक बार उत्तर देने के बाद उसी सवाल के दूसरे बटन लॉक कर दें
        for (let btn of buttons) {
            btn.disabled = true;
        }

        attemptedCount++;

        if (selectedIdx === correctIdx) {
            // सही उत्तर
            selectedButton.classList.add("correct");
            score++;
            feedbackElement.innerText = "बिल्कुल सही जवाब! 🎉";
            feedbackElement.className = "feedback-msg feedback-correct";
        } else {
            // गलत उत्तर
            selectedButton.classList.add("wrong");
            buttons[correctIdx].classList.add("correct"); // सही उत्तर को हरा कर के दिखाएँ
            feedbackElement.innerText = `गलत जवाब! सही उत्तर था: ${buttons[correctIdx].innerText}`;
            feedbackElement.className = "feedback-msg feedback-wrong";
        }

        feedbackElement.style.display = "block";
        
        // लोकल स्टोरेज में सेव करें
        savedAnswers[globalIndex] = selectedIdx;
        localStorage.setItem("quizAnswers", JSON.stringify(savedAnswers));
        localStorage.setItem("quizScore", score);
        localStorage.setItem("quizAttempted", attemptedCount);

        updateScoreBoard();
    }

    // स्कोर अपडेट करने वाला फंक्शन
    function updateScoreBoard() {
        scoreDisplay.innerText = `स्कोर: ${score} / ${attemptedCount}`;
    }

    // स्क्रॉल करते समय अधिक प्रश्न लोड करने की कार्यप्रणाली
    function loadMoreQuestions() {
        if (loadedCount >= quizData.length) {
            loadingSpinner.innerText = "बधाई हो! आपने सभी प्रश्न देख लिए हैं। 🎉";
            return;
        }

        const nextBatchLimit = Math.min(loadedCount + batchSize, quizData.length);
        
        for (let i = loadedCount; i < nextBatchLimit; i++) {
            createQuestionCard(quizData[i], i);
        }

        loadedCount = nextBatchLimit;

        if (loadedCount >= quizData.length) {
            loadingSpinner.innerText = "सभी प्रश्न लोड हो चुके हैं।";
        }
    }

    // स्क्रॉल पोजीशन डिटेक्ट करना
    window.addEventListener("scroll", () => {
        // अगर यूजर स्क्रीन के निचले हिस्से (100px की दूरी) तक स्क्रॉल कर चुका है
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 100) {
            loadMoreQuestions();
        }
    });

    // लोकल स्टोरेज क्लियर (डेटा डिलीट) करने का फंक्शन
    clearStorageBtn.addEventListener("click", () => {
        if(confirm("क्या आप अपना सारा क्विज़ डेटा और स्कोर डिलीट करना चाहते हैं?")) {
            localStorage.removeItem("quizAnswers");
            localStorage.removeItem("quizScore");
            localStorage.removeItem("quizAttempted");
            location.reload(); // पेज रिफ्रेश करके शुरुआत से लोड करें
        }
    });

    // शुरुआत में पहली बैच (प्रथम 10 प्रश्न) लोड करें
    document.addEventListener("DOMContentLoaded", () => {
        // लोकल स्टोरेज से पुराना स्कोर रीस्टोर करें
        score = parseInt(localStorage.getItem("quizScore")) || 0;
        attemptedCount = parseInt(localStorage.getItem("quizAttempted")) || 0;
        updateScoreBoard();

        if (typeof quizData !== 'undefined' && quizData.length > 0) {
            loadMoreQuestions();
        } else {
            quizContainer.innerHTML = "<p style='color: white; text-align: center; margin-top: 50px;'>त्रुटि: प्रश्न डेटाबेस (questions.js) लोड नहीं हो सका।</p>";
        }
    });
</script>
</body>
</html>
